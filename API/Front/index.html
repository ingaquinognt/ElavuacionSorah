<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>API Tareas Personales</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: system-ui, sans-serif;
                background-color: #ffffff;
                padding: 20px;
            }
            .container {
                max-width: 800px;
                margin: 0 auto;
            }
            .card {
                background-color: #fff;
                border-radius: 12px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
                padding: 20px;
                margin-bottom: 20px;
            }
            h1 {
                color: #ff0000;
                margin-bottom: 20px;
            }
            .task-form {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
            }
            .task-form input, .task-form textarea {
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 8px;
                font-size: 14px;
            }
            .task-form input {
                flex: 2;
                min-width: 150px;
            }
            .task-form textarea {
                flex: 3;
                min-width: 200px;
                resize: vertical;
            }
            button {
                padding: 10px 20px;
                background-color: #007bff;
                color: #000000;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-size: 14px;
            }
            button:hover {
                background-color: #0150a5;
            }
            .task-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 15px;
                border-bottom: 1px solid #eee;
            }
            .task-item.completed .task-title {
                text-decoration: line-through;
                color: #888;
            }
            .task-info {
                flex: 1;
            }
            .task-title {
                font-weight: bold;
                margin-bottom: 5px;
            }
            .task-description {
                font-size: 14px;
                color: #666;
            }
            .task-date {
                font-size: 12px;
                color: #999;
                margin-top: 5px;
            }
            .task-actions {
                display: flex;
                gap: 8px;
            }
            .task-actions button {
                padding: 6px 12px;
                font-size: 12px;
            }
            .btn-delete {
                background-color: #dc3545;
            }
            .stats {
                display: flex;
                gap: 20px;
                margin-top: 20px;
            }
            .stat-card {
                background-color: #e9e9e9;
                border-radius: 12px;
                padding: 15px;
                flex: 1;
                text-align: center;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            }
            .stat-number {
                font-size: 28px;
                font-weight: bold;
                color: #c300ff;
            }

            .stat-label {
                font-size: 14px;
                color: #555;
            }

            .loading {
                text-align: center;
                padding: 40px;
                color: #666;
            }
            .error {
                padding: 12px;
                color: #dc3545;
                border-radius: 8px;
                margin-bottom: 20px;
            }
            @media (max-width: 600px) {
                .task-form {
                    flex-direction: column;
                }
                .task-item {
                    flex-direction: column;
                    align-items: flex-start;
                    gap: 10px;
                }
                .task-actions {
                    width: 100%;
                    justify-content: flex-end;
                }
            }

        </style>
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
